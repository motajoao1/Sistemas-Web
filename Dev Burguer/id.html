<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Burguer - Cadastro de Cliente</title>
    <style>
        :root {
            --primary: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .painel-principal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        /* Cabeçalho e Botão Voltar */
        .header-acoes {
            margin-bottom: 20px;
        }

        .btn-voltar {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.9em;
            padding: 8px 12px;
            border-radius: 6px;
            background-color: #f1f2f6;
            transition: all 0.2s ease;
        }

        .btn-voltar:hover {
            background-color: #dfe4ea;
            transform: translateX(-2px);
        }

        h1 {
            color: var(--dark);
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            margin-top: 0;
            text-align: center;
        }

        /* Estilos do Formulário */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark);
            font-weight: 600;
        }

        /* Estilizando os campos de texto e data */
        input[type="text"],
        input[type="email"],
        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
        }

        /* Estilizando os Radio Buttons */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            color: #34495e;
            cursor: pointer;
        }

        .radio-item input[type="radio"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            /* Pinta o botão de rádio com a cor verde */
        }

        /* Botão de Enviar */
        /* Container dos Botões */
        .botoes-acao {
            display: flex;
            gap: 15px;
            /* Espaço entre os botões */
            margin-top: 15px;
        }

        /* Estilos base compartilhados */
        .btn-confirmar,
        .btn-limpar {
            flex: 1;
            /* Faz os botões dividirem o espaço igualmente */
            padding: 14px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* Botão Principal (Verde) */
        .btn-confirmar {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .btn-confirmar:hover {
            background-color: #27ae60;
            transform: translateY(-2px);
        }

        /* Botão Secundário (Limpar) */
        .btn-limpar {
            background-color: #f1f2f6;
            color: var(--dark);
            border: 1px solid #bdc3c7;
        }

        .btn-limpar:hover {
            background-color: #e0e6ed;
            transform: translateY(-2px);
        }

        .btn-confirmar:hover {
            background-color: #27ae60;
        }
    </style>
</head>

<body>

    <main class="painel-principal">

        <div class="header-acoes">
            <a href="index.html" class="btn-voltar">
                &larr; Voltar
            </a>
        </div>

        <h1>Dados do Cliente</h1>

        <form action="cadastro_feito.html" method="GET">

            <div class="form-group">
                <label for="nomeCliente">Nome do cliente:</label>
                <input type="text" id="nomeCliente" name="nome" required placeholder="Digite seu nome completo">
            </div>

            <div class="form-group">
                <label for="E-mail">E-mail:</label>
                <input type="email" id="E-mail" name="email" required placeholder="exemplo@email.com">
            </div>

            <div class="form-group">
                <label for="WhatsAppdeContato">WhatsApp de Contato:</label>
                <input type="text" id="WhatsAppdeContato" name="whatsapp" pattern="\(\d{2}\)\s?\d{5}-\d{4}" required
                    placeholder="(XX) 9XXXX-XXXX">
            </div>

            <div class="form-group">
                <label for="DatadaVisita">Data da Visita:</label>
                <input type="date" id="DatadaVisita" name="data_visita" required>
            </div>

            <div class="form-group">
                <label>Gênero:</label>
                <div class="radio-group">
                    <label class="radio-item">
                        <input type="radio" name="genero" value="Masculino" required> Masculino
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="genero" value="Feminino"> Feminino
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="genero" value="Outro"> Outro
                    </label>
                    <label class="radio-item">
                        <input type="radio" name="genero" value="Prefiro não informar"> Prefiro não informar
                    </label>
                </div>
            </div>

            <div class="botoes-acao">
                <button type="reset" class="btn-limpar">Limpar Formulário</button>
                <button type="submit" class="btn-confirmar">Confirmar Cadastro</button>
            </div>
        </form>

    </main>

</body>

</html>
