<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Burguer - Início</title>
    <style>
        :root {
            --primary: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* Reaproveitando a estrutura de "card" do menu anterior */
        .painel-principal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: var(--dark);
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            margin-top: 0;
            font-size: 2.2em;
        }

        .subtitulo {
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 25px;
        }

        /* Estilizando a lista de links para parecerem botões de navegação */
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        nav a {
            display: block;
            text-decoration: none;
            color: var(--dark);
            background-color: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border-left: 4px solid transparent;
        }

        nav a:hover {
            background-color: #ecf0f1;
            border-left: 4px solid var(--primary);
            transform: translateX(5px);
            /* Efeito suave de movimento */
        }

        h2 {
            font-size: 1.3em;
            margin-top: 30px;
            margin-bottom: 5px;
            color: var(--dark);
        }

        .info {
            color: #34495e;
            font-size: 0.95em;
            margin-top: 5px;
        }

        footer {
            margin-top: 35px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            font-size: 0.85em;
            color: #95a5a6;
        }
    </style>
</head>

<body>

    <main class="painel-principal">
        <h1>Dev Burguer</h1>
        <p class="subtitulo">O melhor food truck para programadores!</p>

        <nav>
            <ul>
                <li><a href="id.html">Cadastro</a></li>
                <li><a href="cardapio.html">Cardápio</a></li>
                <li><a href="pedido.html">Faça seu Pedido</a></li>
                <li><a href="feedback.html">Dê o seu Feedback</a></li>
            </ul>
        </nav>

        <section>
            <h2>Horário de Funcionamento</h2>
            <p class="info">Terça a Domingo - das 18h às 23h.</p>
        </section>

        <section>
            <h2>Localização</h2>
            <p class="info">Rua dos Servidores, 404 - Bairro do Código.</p>
        </section>

        <footer>
            &copy; 2026 Dev Burguer Food Truck
        </footer>
    </main>

</body>

</html>
