<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Burguer - Sucesso</title>
    <style>
        :root {
            --primary: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .painel-principal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        /* Estilo do Botão de Voltar padronizado */
        .header-acoes {
            margin-bottom: 20px;
            text-align: left;
        }

        .btn-voltar {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--dark);
            font-weight: 600;
            font-size: 0.9em;
            padding: 8px 12px;
            border-radius: 6px;
            background-color: #f1f2f6;
            transition: all 0.2s ease;
        }

        .btn-voltar:hover {
            background-color: #dfe4ea;
            transform: translateX(-2px);
        }

        h1 {
            color: var(--dark);
            border-bottom: 3px solid var(--primary);
            padding-bottom: 10px;
            margin-top: 0;
            font-size: 2.2em;
        }

        /* Destaque visual para a mensagem de sucesso */
        h2 {
            color: var(--primary); 
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .mensagem {
            color: #34495e;
            font-size: 1.05em;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        footer {
            margin-top: 35px;
            padding-top: 15px;
            border-top: 1px dashed #ccc;
            font-size: 0.85em;
            color: #95a5a6;
        }
    </style>
</head>
<body>

    <main class="painel-principal">
        
        <div class="header-acoes">
            <a href="index.html" class="btn-voltar">
                &larr; Voltar para o Início
            </a>
        </div>

        <h1>Dev Burguer</h1>
        
        <h2>Cadastro com sucesso! 🎉</h2>
        <p class="mensagem">Obrigado por se cadastrar no Dev Burguer! Agora você pode explorar nosso cardápio, fazer pedidos e deixar seu feedback. Estamos ansiosos para servi-lo com os melhores hambúrgueres da cidade!</p>
        
        <footer>
            &copy; 2026 Dev Burguer Food Truck
        </footer>
    </main>

</body>
</html>
